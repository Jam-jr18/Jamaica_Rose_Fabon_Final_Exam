<!DOCTYPE html>
<html>
<head>

    <title>
        Student Information Management System
    </title>

    <link rel="stylesheet" href="/style.css">

</head>

<body>

<nav>

    <h1>
        Student Information Management System
    </h1>

</nav>

<div class="container">

    <h2>Add Student</h2>

    <form id="studentForm">

        <input
            type="text"
            id="student_id"
            placeholder="Student ID"
            required
        >

        <input
            type="text"
            id="full_name"
            placeholder="Full Name"
            required
        >

        <input
            type="text"
            id="course"
            placeholder="Course"
            required
        >

        <input
            type="text"
            id="year_level"
            placeholder="Year Level"
            required
        >

        <input
            type="email"
            id="email"
            placeholder="Email Address"
            required
        >

        <button type="submit">
            Add Student
        </button>

    </form>

    <hr>

    <h2>Student List</h2>

    <table>

        <thead>

            <tr>
                <th>ID</th>
                <th>Student ID</th>
                <th>Full Name</th>
                <th>Course</th>
                <th>Year Level</th>
                <th>Email</th>
                <th>Actions</th>
            </tr>

        </thead>

        <tbody id="studentTable"></tbody>

    </table>

</div>

<script src="/script.js"></script>

</body>
</html>
